features:
  title: Everything Your Non-Profit Needs for Professional Video & Streaming
  description: From initial consultation to ongoing support, we provide complete solutions that make professional-quality video production accessible and sustainable for nonprofits of all sizes.
  items:
    - title: Professional Equipment
      description: Access to broadcast-quality cameras, audio systems, lighting, and streaming gear—no need to buy expensive equipment upfront.
      icon: i-lucide-camera
    - title: Expert Technicians
      description: Experienced production crew who understand the flow of nonprofit events and community programs.
      icon: i-lucide-user-check
    - title: Fast Setup
      description: Quick deployment for special events, or permanent installation for ongoing programs. We work around your schedule.
      icon: i-lucide-rocket
    - title: Staff & Volunteer Training
      description: Comprehensive training programs that empower your team to run professional-quality productions independently.
      icon: i-lucide-graduation-cap
    - title: Multi-Platform Distribution
      description: Stream to YouTube, Facebook, your website, and apps—all managed from one system with automated archiving.
      icon: i-lucide-monitor-play
    - title: Ongoing Support
      description: Technical support available when you need it, plus regular equipment maintenance and software updates.
      icon: i-lucide-headset
testimonials:
  headline: What Non-Profits Are Saying
  title: Real Results from Real Organizations
  description: See how nonprofits like yours are using professional video and marketing to expand their reach and deepen community engagement.
  items:
    - quote: TruMedia Creative transformed our livestream from a challenge into a strength. Their thoughtful outcomes, clear planning, and technical expertise gave us a consistent, high-quality livestream and a confident, engaged tech team. We highly recommend them for AV and livestream upgrades.
      user:
        name: Jeff Mehl
        description: Operations Director at Shore Christian Church
        avatar:
          src:
    - quote: Our online attendance tripled after upgrading our streaming setup. Now we reach members who can't attend in person and visitors who are checking us out before visiting.
      user:
        name: Pastor Mike Johnson
        description: Community Church, NJ
        avatar:
          src: https://i.pravatar.cc/120?img=12
    - quote: The training they provided gave our volunteer team the confidence to run professional productions every Sunday. Our worship experience has never looked or sounded better.
      user:
        name: Sarah Williams
        description: Worship Director, Faith Chapel
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: We went from struggling with basic streaming to producing multi-camera events with professional graphics. The impact on our organization has been incredible.
      user:
        name: Rev. David Martinez
        description: Grace Community Church
        avatar:
          src: https://i.pravatar.cc/120?img=8
